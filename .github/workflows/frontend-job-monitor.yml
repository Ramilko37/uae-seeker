name: Frontend Job Monitor

on:
  workflow_dispatch:
  schedule:
    # 07:15 UTC every day.
    - cron: '15 7 * * *'

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Run tests
        run: pytest

      - name: Collect jobs
        env:
          JSEARCH_API_KEY: ${{ secrets.JSEARCH_API_KEY }}
          JSEARCH_API_HOST: jsearch.p.rapidapi.com
        run: |
          python -m job_monitor collect \
            --config config/sources.example.yaml \
            --db data/jobs.sqlite \
            --digest out/digest.md

      - name: Upload digest and database
        uses: actions/upload-artifact@v4
        with:
          name: frontend-job-monitor-output
          path: |
            out/digest.md
            data/jobs.sqlite
